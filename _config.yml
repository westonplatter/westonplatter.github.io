# Site Configuration

lang: en
timezone: America/Denver

title: westonplatter
tagline: software & data engineer
description: Personal blog of Weston Platter - software and data engineering

url: "https://westonplatter.com"
baseurl: ""

github:
  username: westonplatter

social:
  name: Weston Platter
  email: westonplatter@gmail.com
  links:
    - https://github.com/westonplatter
    - https://www.linkedin.com/in/westonplatter

# Markdown
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /posts/:title/

sass:
  style: compressed

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
