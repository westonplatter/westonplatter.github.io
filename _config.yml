# The Site Configuration

lang: en
timezone: America/Denver

title: westonplatter
tagline: software & infrastructure engineer
description: Personal blog of Weston Platter - software and data engineering

url: "https://westonplatter.com"
baseurl: ""

github:
  username: westonplatter

social:
  name: Weston Platter
  links:
    - https://github.com/westonplatter
    - https://www.linkedin.com/in/westonplatter

plugins:
  - jekyll-sitemap

# Kramdown settings
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Collections
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
